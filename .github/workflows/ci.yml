name: CI

on: [push, pull_request]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: pre-commit インストール
        run: python -m pip install --upgrade pre-commit

      - name: pre-commit 実行
        run: pre-commit run --all-files