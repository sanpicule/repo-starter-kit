name: CI

on: [push, pull_request]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: pre-commit 用 Docker イメージをビルド
        run: docker build -t repo-starter-kit-pre-commit -f docker/pre-commit/Dockerfile .

      - name: pre-commit 実行（Docker 内）
        run: docker run --rm -v "$GITHUB_WORKSPACE:/workspace" -w /workspace repo-starter-kit-pre-commit pre-commit run --all-files
